services:
  - type: web
    name: realestate-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    plan: free
    branch: main
    envVars:
      - key: FB_VERIFY_TOKEN
        value: tanta_real_estate_2026
      - key: FB_PAGE_ACCESS_TOKEN
        sync: false
      - key: FB_APP_SECRET
        sync: false
      - key: WHATSAPP_API_KEY
        sync: false
